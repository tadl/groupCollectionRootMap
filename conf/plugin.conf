# Enable plugin
# Keep this at 0 in version-controlled defaults and enable in plugin.local.conf.
enable = 0

# Deployment note:
# Keep server-specific values in conf/plugin.local.conf.
# If present, plugin.local.conf keys override plugin.conf keys.

# Only users with this role are subject to this plugin's mapping checks.
# Set blank to disable role gating.
required_role =

# If set, users with is_administrator bypass parent/root checks
bypass_for_administrators = 1

# If set, users (matching required_role) with no user-id mapping are blocked
require_mapping_for_all_users = 0

# If set, parent_id = 0 (top-level/root placement) is allowed
allow_root_parent_assignment = 0

# Map user_id to one or more allowed root collection IDs.
user_root_collection_map = {
}
